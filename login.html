<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#0A2540">
  <title>Admin Login — Luxpath Travel</title>

  <!-- Content Security Policy (meta tag — note: frame-ancestors only works
       as a server response header, not here. Set these at hosting level:
         X-Frame-Options: DENY
         Content-Security-Policy: frame-ancestors 'none' -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src https://fonts.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://accounts.google.com; img-src 'self' data: https://*.supabase.co https://lh3.googleusercontent.com">

  <link rel="icon" type="image/png" href="/favicon-96x96.png" sizes="96x96" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="shortcut icon" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-title" content="Luxpath" />
  <link rel="manifest" href="/site.webmanifest" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="assets/css/login.css">
</head>

<body>

  <!-- ── CHECKING STATE (shown while verifying existing session) ── -->
  <div class="auth-checking" id="authChecking" aria-live="polite" aria-label="Checking authentication">
    <div class="auth-checking__spinner" aria-hidden="true"></div>
    <p class="auth-checking__label">Checking session…</p>
  </div>

  <!-- ── LOGIN SCREEN (shown only when not authenticated) ───────── -->
  <main class="auth-screen" id="authScreen" hidden>
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-card__brand">
        <img src="luxpath-logo.webp" alt="Luxpath Travel" class="auth-logo" data-logo-fallback
             width="150" height="44">
        <span class="auth-logo-fallback" style="display:none">Luxpath</span>
      </div>

      <!-- Header -->
      <div class="auth-card__header">
        <div class="auth-card__lock" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>
        </div>
        <h1 class="auth-card__title">Admin Portal</h1>
        <p class="auth-card__subtitle">Use your authorized Google account to sign in</p>
      </div>

      <!-- Error banner -->
      <div class="auth-error" id="loginError" role="alert" hidden>
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/>
          <line x1="12" y1="16" x2="12.01" y2="16"/>
        </svg>
        <span id="loginErrorMsg">An error occurred.</span>
      </div>

      <!-- Google Sign-In -->
      <button class="btn btn--google btn--full" type="button" id="googleBtn">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 48 48" aria-hidden="true">
          <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
          <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
          <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
          <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.29-8.16 2.29-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
        </svg>
        Login with Google
      </button>

      <!-- Footer -->
      <div class="auth-card__footer">
        <a href="/" class="auth-back-link">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true">
            <polyline points="15 18 9 12 15 6"/>
          </svg>
          Back to website
        </a>
      </div>

    </div>
  </main>

  <!-- ── NOT CONFIGURED STATE ────────────────────────────────────── -->
  <main class="auth-screen" id="notConfiguredScreen" hidden>
    <div class="auth-card auth-card--warn">
      <div class="auth-card__brand">
        <img src="luxpath-logo.webp" alt="Luxpath Travel" data-logo-fallback width="150" height="44">
      </div>
      <div class="not-configured">
        <div class="not-configured__icon" aria-hidden="true">⚙️</div>
        <h1 class="not-configured__title">Supabase Not Configured</h1>
        <p class="not-configured__body">
          Add your Supabase project URL and anon key to
          <code>assets/js/login.js</code> and
          <code>assets/js/dashboard.js</code> to enable authentication.
        </p>
        <a href="/" class="btn btn--ghost">Back to Website</a>
      </div>
    </div>
  </main>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.46.1/dist/umd/supabase.min.js"
          integrity="sha384-f0hTybREi6MIGk1gXyD3UFZAL6sgul9hUVIQHUrByVE26aj5oryZvWtlcda66csi"
          crossorigin="anonymous"></script>
  <script src="assets/js/login.js" defer></script>

</body>
</html>
